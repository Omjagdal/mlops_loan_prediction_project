apiVersion: v1
kind: Service
metadata:
  name: backend-service
  labels:
    app: loan-prediction
    component: backend
spec:
  type: ClusterIP
  selector:
    app: loan-prediction
    component: backend
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  labels:
    app: loan-prediction
    component: frontend
spec:
  type: LoadBalancer
  selector:
    app: loan-prediction
    component: frontend
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-service
  labels:
    app: loan-prediction
    component: mlflow
spec:
  type: ClusterIP
  selector:
    app: loan-prediction
    component: mlflow
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
      name: http
