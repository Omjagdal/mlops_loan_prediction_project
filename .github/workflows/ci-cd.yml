name: Loan Prediction CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # ============================================
  # Job 1: Lint & Test Backend
  # ============================================
  test-backend:
    name: Lint & Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest flake8

      - name: Lint with flake8
        run: |
          flake8 backend/ ml_pipeline/ --max-line-length=120 --ignore=E501,W503,F401,E226,F541,E128,F841

      - name: Test backend imports
        run: |
          cd backend && python -c "from app.main import app; print('Backend imports OK')"

  # ============================================
  # Job 2: ML Pipeline Validation
  # ============================================
  ml-validate:
    name: ML Pipeline Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dataset
        run: python -m ml_pipeline.src.generate_dataset

      - name: Run preprocessing
        run: python -m ml_pipeline.src.data_preprocessing

      - name: Train models
        run: python -m ml_pipeline.src.train

      - name: Evaluate model (deployment gate)
        env:
          CI: 'true'
        run: python -m ml_pipeline.src.evaluate

      - name: Verify model artifacts exist
        run: |
          test -f backend/models/model.pkl && echo "model.pkl OK"
          test -f backend/models/model_metadata.json && echo "metadata OK"
          test -f ml_pipeline/experiments/evaluation_results.json && echo "eval results OK"

  # ============================================
  # Job 3: Build & Test Frontend
  # ============================================
  test-frontend:
    name: Build & Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        run: |
          cd frontend
          npm install
          npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/

  # ============================================
  # Job 4: Deploy Backend to Render
  # ============================================
  deploy-backend:
    name: Deploy Backend to Render
    needs: [test-backend, ml-validate]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -s "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Render deploy triggered"

  # ============================================
  # Job 5: Deploy Frontend to Vercel
  # ============================================
  deploy-frontend:
    name: Deploy Frontend to Vercel
    needs: [test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: '--prod'

  # ============================================
  # Job 6: Upload ML Artifacts to Supabase
  # ============================================
  upload-artifacts:
    name: Upload ML Artifacts to Supabase
    needs: [ml-validate]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate, Train & Upload
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_BUCKET: ml-artifacts
        run: |
          python -m ml_pipeline.src.generate_dataset
          python -m ml_pipeline.src.data_preprocessing
          python -m ml_pipeline.src.train
          python -m ml_pipeline.src.upload_artifacts
